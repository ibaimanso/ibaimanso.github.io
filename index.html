<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Lista de la compra compartida y menú semanal familiar — sincroniza en tiempo real">
  <title>FamiList — Lista y Menú Familiar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F46E5'/><text x='50' y='65' text-anchor='middle' font-size='55'>🛒</text></svg>">
</head>
<body>
  <div id="app">

    <!-- ─── Header ─────────────────────────────── -->
    <header class="app-header">
      <div class="app-header__logo">
        <span class="app-header__logo-icon">🛒</span>
        <span class="app-header__title" id="header-title">FamiList</span>
      </div>
      <div class="sync-indicator" id="sync-indicator"></div>
    </header>

    <!-- ─── Pages ──────────────────────────────── -->
    <main class="app-content">
      <section id="page-shopping" class="page page--active"></section>
      <section id="page-menu" class="page"></section>
      <section id="page-settings" class="page"></section>
    </main>

    <!-- ─── Bottom Navigation ──────────────────── -->
    <nav class="app-nav" id="app-nav">
      <button class="nav-btn nav-btn--active" data-page="shopping">
        <span class="nav-icon"></span>
        <span class="nav-btn__label">Lista</span>
      </button>
      <button class="nav-btn" data-page="menu">
        <span class="nav-icon"></span>
        <span class="nav-btn__label">Menú</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="nav-icon"></span>
        <span class="nav-btn__label">Ajustes</span>
      </button>
    </nav>

    <!-- ─── Modals ─────────────────────────────── -->
    <div id="modal-container"></div>

    <!-- ─── Toasts ─────────────────────────────── -->
    <div id="toast-container"></div>

  </div>

  <!-- PeerJS para sincronización P2P WebRTC -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- App (ES Modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
